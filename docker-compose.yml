services:
  app:
    build: .
    tty: true
    ports:
      - "8000:8000"     # Akses via localhost:8000
      - "443:443"       # Untuk HTTPS .localhost
      - "443:443/udp"   # HTTP/3 (sangat cepat untuk UI Filament)
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=best_school
      - DB_USERNAME=root
      - DB_PASSWORD=
      # SERVER_NAME diatur agar mendukung localhost dan domain kustom
      - SERVER_NAME=http://localhost:8000, bestschool.localhost
      - CADDY_GLOBAL_OPTIONS="local_certs"
    volumes:
      - .:/app
    networks:
      - filament-network

  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_DATABASE: best_school
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - filament-network

networks:
  filament-network:
    driver: bridge

volumes:
  db_data: